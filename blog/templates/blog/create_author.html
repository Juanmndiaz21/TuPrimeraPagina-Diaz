{% extends "blog/base.html" %}
{% block title %}Nuevo Autor{% endblock %}

{% block content %}
<div class="card p-4" style="max-width: 600px; margin: auto;">
    <h2 class="mb-4"> Agregar un autor</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success mt-3">Guardar Autor</button>
        <a href="{% url 'author_list' %}" class="btn btn-outline-secondary mt-3">Cancelar</a>
    </form>
</div>
{% endblock %}
