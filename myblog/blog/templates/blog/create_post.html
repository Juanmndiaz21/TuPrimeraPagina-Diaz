{% extends "blog/base.html" %}

{% block title %}New Post{% endblock %}

{% block content %}
<div class="card p-4" style="max-width: 700px; margin: auto;">
    <h2 class="mb-4"> Create a New Post</h2>


    <form method="post" action="">

        {% csrf_token %}


        {{ form.as_p }}

        <button type="submit" class="btn btn-primary mt-3">Save Post</button>
        <a href="{% url 'home' %}" class="btn btn-outline-secondary mt-3">Cancel</a>
    </form>
</div>
{% endblock %}
